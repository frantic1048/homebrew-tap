name: Update formula

on:
  repository_dispatch:
    types: [update-formula]
  workflow_dispatch:
    inputs:
      formula:
        description: "Formula name (e.g. blend)"
        required: true
        type: string
      version:
        description: "New version (e.g. 0.3.0)"
        required: true
        type: string

permissions: {}

jobs:
  update:
    name: Update ${{ github.event.client_payload.formula || inputs.formula }} to v${{ github.event.client_payload.version || inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Resolve inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            FORMULA="${{ github.event.client_payload.formula }}"
            VERSION="${{ github.event.client_payload.version }}"
          else
            FORMULA="${{ inputs.formula }}"
            VERSION="${{ inputs.version }}"
          fi

          if [ -z "$FORMULA" ] || [ -z "$VERSION" ]; then
            echo "::error::Both formula and version are required"
            exit 1
          fi

          # Skip prerelease versions
          case "$VERSION" in
            *-*)
              echo "::notice::Skipping prerelease version $VERSION"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "skip=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

          echo "formula=$FORMULA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: steps.inputs.outputs.skip == 'false'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Update formula
        if: steps.inputs.outputs.skip == 'false'
        env:
          FORMULA: ${{ steps.inputs.outputs.formula }}
          VERSION: ${{ steps.inputs.outputs.version }}
        run: python3 .github/scripts/update-formula.py

      - name: Create app token
        if: steps.inputs.outputs.skip == 'false'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Create pull request
        if: steps.inputs.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          FORMULA: ${{ steps.inputs.outputs.formula }}
          VERSION: ${{ steps.inputs.outputs.version }}
        run: |
          BRANCH="dev/update-${FORMULA}-v${VERSION}"

          git config user.name "houki-san[bot]"
          git config user.email "271583647+houki-san[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git checkout -b "$BRANCH"
          git add "Formula/${FORMULA}.rb"
          git commit -m "chore: update ${FORMULA} to v${VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: update ${FORMULA} to v${VERSION}" \
            --body "Automated formula update triggered by [${FORMULA}-v${VERSION}](https://github.com/frantic1048/Vanilla/releases/tag/${FORMULA}-v${VERSION}) release." \
            --base main \
            --head "$BRANCH"
